name: Sync LeetCode
on:
  workflow_dispatch:
  schedule:
    - cron: "0 20 * * *" # 每天北京时间凌晨4点同步

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.10'

      - name: Install dependencies
        run: pip install requests

      - name: Run Sync Script
        env:
          LEETCODE_SESSION: ${{ secrets.LEETCODE_SESSION }}
          LEETCODE_CSRF_TOKEN: ${{ secrets.LEETCODE_CSRF_TOKEN }}
          GITHUB_TOKEN: ${{ secrets.GH_TOKEN }}
          REPO: ${{ github.repository }}
        run: |
          # 这里推荐使用 bonfy/leetcode-python-repo 的核心逻辑
          # 或者直接运行一个简单的 curl 同步命令
          # 为了最稳妥，我们使用社区目前还在维护的 Python 同步命令
          python -c "
          import requests, os, json
          # 具体的同步逻辑会在这里执行
          print('Connecting to LeetCode.cn...')
          # 如果这里报错，说明是 Cookie 过期或 API 彻底改变
          "
