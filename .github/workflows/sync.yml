name: Sync LeetCode CN to GitHub

on:
  workflow_dispatch:  # 允许手动运行
  schedule:
    - cron: "0 0 * * *"  # 每天0点同步（正确5位 cron）

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: LeetCode CN Sync
        uses: Zou8080/leetcode-cn-sync@main
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          leetcode_cookies: ${{ secrets.LEETCODE_CN_COOKIE }}
