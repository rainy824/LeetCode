name: Sync LeetCode CN to GitHub

on:
  workflow_dispatch:   # 允许手动运行
  schedule:
    - cron: "0 0 * * *"  # 每天0点同步

jobs:
  sync:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Sync LeetCode CN
        uses: "luoxuansmile/leetcode-sync-github@master"
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          leetcode_session: ${{ secrets.LEETCODE_SESSION }}
          csrf_token: ${{ secrets.LEETCODE_CSRF_TOKEN }}
